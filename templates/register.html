{% extends 'base.html' %} {% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow">
        <div class="card-header bg-primary text-white py-3">
          <h2 class="mb-0 text-center">
            <i class="bi bi-person-plus"></i> <span data-i18n="register.title">Crear Nueva Cuenta</span>
          </h2>
        </div>
        <div class="card-body p-4">
          <form method="post" enctype="multipart/form-data" novalidate>
            <!-- Foto de Perfil -->
            <div class="text-center mb-4">
              <div class="position-relative d-inline-block">
                <div
                  id="previewContainer"
                  class="rounded-circle d-flex align-items-center justify-content-center bg-primary text-white"
                  style="
                    width: 120px;
                    height: 120px;
                    font-size: 48px;
                    border: 3px solid #0d6efd;
                  "
                >
                  <i class="bi bi-person-circle"></i>
                </div>
              </div>
              <div class="mt-3">
                <label
                  for="foto_perfil_register"
                  class="btn btn-sm btn-outline-primary"
                >
                  <i class="bi bi-camera"></i> <span data-i18n="register.photo.select">Seleccionar foto de perfil</span>
                </label>
                <input
                  type="file"
                  class="d-none"
                  id="foto_perfil_register"
                  name="foto_perfil"
                  accept="image/*"
                />
                <small class="d-block text-muted mt-2" data-i18n="register.photo.help"
                  >Opcional - Formatos: JPG, PNG, GIF, WEBP</small
                >
              </div>
            </div>

            <hr class="my-4" />

            <!-- Información Básica -->
            <h5 class="text-primary mb-3">
              <i class="bi bi-person-circle"></i> <span data-i18n="register.section.basic">Información Básica</span>
            </h5>

            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label class="form-label fw-bold"
                  ><span data-i18n="register.name">Nombre</span> <span class="text-danger">*</span></label
                >
                <input
                  class="form-control"
                  type="text"
                  name="nombre"
                  required
                />
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold"
                  ><span data-i18n="register.lastname">Apellidos</span> <span class="text-danger">*</span></label
                >
                <input
                  class="form-control"
                  type="text"
                  name="apellidos"
                  required
                />
              </div>
            </div>

            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label for="edad" class="form-label fw-bold"
                  ><span data-i18n="register.age">Edad</span> <span class="text-danger">*</span></label
                >
                <select id="edad" name="edad" class="form-select" required>
                  <option value="" disabled selected data-i18n="register.age.placeholder">Selecciona tu edad</option>
                </select>
              </div>
            </div>

            <hr class="my-4" />

            <!-- Formación Académica -->
            <h5 class="text-primary mb-3">
              <i class="bi bi-mortarboard"></i> <span data-i18n="register.section.education">Formación Académica</span>
            </h5>

            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label class="form-label fw-bold"
                  ><span data-i18n="register.education.level">Nivel de Estudios</span> <span class="text-danger">*</span></label
                >
                <select class="form-select" name="nivel_estudios" required>
                  <option value="" data-i18n="register.select">Selecciona...</option>
                  <option value="ESO">ESO</option>
                  <option value="Bachillerato">Bachillerato</option>
                  <option value="FP Grado Medio">FP Grado Medio</option>
                  <option value="FP Grado Superior">FP Grado Superior</option>
                  <option value="Grado Universitario">
                    Grado Universitario
                  </option>
                  <option value="Máster">Máster</option>
                  <option value="Doctorado">Doctorado</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold" data-i18n="register.education.degree">Titulación</label>
                <input
                  class="form-control"
                  type="text"
                  name="titulacion"
                  placeholder="Ej: Grado en Derecho" data-i18n-placeholder="register.education.degree.placeholder"
                />
              </div>
            </div>

            <hr class="my-4" />

            <!-- Información Adicional Opcional -->
            <h5 class="text-primary mb-3">
              <i class="bi bi-info-circle"></i> <span data-i18n="register.section.extra">Información Adicional</span>
              <span class="text-muted small" data-i18n="register.optional">(Opcional)</span>
            </h5>

            <div class="mb-3">
              <label class="form-label fw-bold" data-i18n="register.phone">Teléfono</label>
              <input
                class="form-control"
                type="tel"
                name="telefono"
                placeholder="+34 600 000 000" data-i18n-placeholder="register.phone.placeholder"
              />
            </div>

            <hr class="my-4" />

            <!-- Cuenta de Acceso -->
            <h5 class="text-primary mb-3">
              <i class="bi bi-shield-lock"></i> <span data-i18n="register.section.access">Datos de Acceso</span>
            </h5>

            <div class="mb-3">
              <label class="form-label fw-bold"
                ><span data-i18n="register.email">Email</span> <span class="text-danger">*</span></label
              >
              <input
                class="form-control"
                type="email"
                name="email"
                placeholder="tu@email.com" data-i18n-placeholder="register.email.placeholder"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold"
                ><span data-i18n="register.password">Contraseña</span> <span class="text-danger">*</span></label
              >
              <div class="position-relative">
                <input
                  class="form-control pe-5"
                  type="password"
                  name="password"
                  id="password-register"
                  minlength="6"
                  required
                />
                <button
                  class="btn position-absolute top-50 end-0 translate-middle-y border-0 bg-transparent"
                  type="button"
                  onclick="togglePasswordVisibility('register')"
                  style="z-index: 10"
                >
                  <i class="bi bi-eye text-muted" id="eye-icon-register"></i>
                </button>
              </div>
              <small class="form-text text-muted" data-i18n="register.password.help">Mínimo 6 caracteres</small>
            </div>

            <div class="d-grid gap-2 mt-4">
              <button type="submit" class="btn btn-primary btn-lg">
                <i class="bi bi-check-circle"></i> <span data-i18n="register.submit">Crear Cuenta</span>
              </button>
              <a
                href="{{ url_for('auth.login') }}"
                class="btn btn-outline-secondary"
                data-i18n="register.hasAccount"
              >
                ¿Ya tienes cuenta? Inicia sesión
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
