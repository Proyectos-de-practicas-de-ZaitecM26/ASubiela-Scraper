{% extends "base.html" %}
{% block title %}Oposiciones del día - BOE{% endblock %}

{% block content %}

<!-- Hero -->
<div class="hero-image-container">
  <img src="{{ url_for('static', filename='img/hero-oposiciones.avif') }}" alt="Oposiciones BOE" class="hero-image"
    onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
  <div class="hero-fallback" style="display: none;">
    <h1 class="hero-title">Oposiciones BOE</h1>
  </div>
</div>

<div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
  <h2 class="mb-0">Departamentos</h2>

  <span class="text-muted fs-5">
    📅 Oposiciones del {{ fecha_hoy }}
  </span>
</div>

<div class="row g-4">
  {% for dep in departamentos %}
  <div class="col-md-4 col-lg-3">
    <a href="{{ url_for('main.mostrar_departamento', nombre=dep['departamento']) }}" class="text-decoration-none">
      <div class="card h-100 shadow-sm tarjeta-departamento">
        <img src="{{ url_for('static', filename='img/dept/' + dep['departamento']|replace(' ', '_') + '.avif') }}"
          class="card-img-top" alt="{{ dep['departamento'] }}"
          onerror="this.src='{{ url_for('static', filename='img/default.svg') }}'">
        <div class="card-body">
          <h5 class="card-title">{{ dep['departamento'] }}</h5>
        </div>
      </div>
    </a>
  </div>
  {% endfor %}
</div>

<!-- =========================
     CHATBOT FLOTANTE
========================= -->
<div id="chatbot-widget">
  <div id="chatbot-header">💬 Chat BOE</div>

  <div id="chatbot-body">
    <div id="chatbot-messages"></div>

    <div class="chatbot-input-area">
      <input type="text" id="chatbot-input" placeholder="Escribe tu duda..." />
      <button onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
const input = document.getElementById("chatbot-input");
const chat = document.getElementById("chatbot-messages");

// Enter para enviar
input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});

async function sendMessage() {
    const message = input.value.trim();
    if (!message) return;

    // mensaje usuario
    chat.innerHTML += `<div class="msg user">${message}</div>`;
    input.value = "";

    // loader IA
    const loadingId = "loading-" + Date.now();
    chat.innerHTML += `<div class="msg bot" id="${loadingId}">🧠 Pensando...</div>`;
    chat.scrollTop = chat.scrollHeight;

    try {
        const res = await fetch("/chatbot/api", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message })
        });

        const data = await res.json();

        document.getElementById(loadingId).remove();

        chat.innerHTML += `<div class="msg bot">${data.reply}</div>`;
    } catch (err) {
        document.getElementById(loadingId).remove();
        chat.innerHTML += `<div class="msg bot">❌ Error conectando con la IA</div>`;
    }

    chat.scrollTop = chat.scrollHeight;
}
</script>

{% endblock %}
