{% extends "base.html" %}

{% block title %}Chat - Oposiciones BOE{% endblock %}

{% block content %}
<div class="container py-4 contenido-principal">
  <h1 class="mb-4 text-center hero-title" data-i18n="chatpage.title">🤖 Chatbot activo</h1>

  <div id="chatbot-widget" class="chatpage-widget mx-auto">
    <div id="chatbot-header" data-i18n="chatpage.header">💬 Chat BOE</div>

    <div id="chatbot-messages">
      <div class="msg bot" data-i18n="chatpage.welcome">Hola 👋 soy tu asistente de oposiciones</div>
    </div>

    <div class="chatbot-input-area">
      <input type="text" id="chatbot-input" placeholder="Escribe algo..." data-i18n-placeholder="chatpage.placeholder">
      <button id="chatbot-send-btn" type="button" data-i18n-aria-label="chatpage.sendAria">➤</button>
    </div>
  </div>
</div>

<style>
  .chatpage-widget {
    width: min(100%, 760px);
    height: 70vh;
    min-height: 420px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid rgba(0, 74, 173, 0.2);
  }

  #chatbot-header {
    background: #004aad;
    color: #fff;
    padding: 12px 14px;
    font-weight: 700;
  }

  #chatbot-messages {
    flex: 1;
    padding: 12px;
    overflow-y: auto;
    font-size: 14px;
    background: #f7f9fc;
  }

  .msg {
    margin: 8px 0;
    padding: 8px 10px;
    border-radius: 8px;
    max-width: 90%;
    line-height: 1.35;
  }

  .msg.user {
    background: #e3efff;
    color: #004aad;
    margin-left: auto;
    text-align: right;
  }

  .msg.bot {
    background: #f1f1f1;
    color: #333;
    margin-right: auto;
  }

  .chatbot-input-area {
    display: flex;
    border-top: 1px solid #ddd;
    background: #fff;
  }

  #chatbot-input {
    flex: 1;
    padding: 12px;
    border: none;
    outline: none;
  }

  #chatbot-send-btn {
    background: #004aad;
    color: #fff;
    border: none;
    padding: 10px 16px;
    cursor: pointer;
  }

  #chatbot-send-btn:hover {
    background: #003a8c;
  }

  [data-theme="dark"] .chatpage-widget {
    background: #1f2937;
    border-color: rgba(255, 255, 255, 0.15);
  }

  [data-theme="dark"] #chatbot-messages {
    background: #111827;
  }

  [data-theme="dark"] .msg.bot {
    background: #374151;
    color: #f3f4f6;
  }

  [data-theme="dark"] #chatbot-input {
    background: #1f2937;
    color: #f3f4f6;
  }
</style>

<script>
  (function () {
    const input = document.getElementById('chatbot-input');
    const chat = document.getElementById('chatbot-messages');
    const sendBtn = document.getElementById('chatbot-send-btn');

    if (!input || !chat || !sendBtn) return;

    const t = (key, fallback) => {
      const i18n = window.__boeI18n;
      return i18n && typeof i18n.t === 'function' ? i18n.t(key, fallback) : fallback;
    };

    function appendMessage(text, role) {
      const div = document.createElement('div');
      div.className = role === 'user' ? 'msg user' : 'msg bot';
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      appendMessage(message, 'user');
      input.value = '';

      try {
        const res = await fetch('/chatbot/api', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });

        const data = await res.json();
        appendMessage(data.reply || t('chat.error.response', 'No pude responder ahora mismo.'), 'bot');
      } catch (_) {
        appendMessage(t('chat.error.connection', 'Error de conexión con el asistente.'), 'bot');
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', function (event) {
      if (event.key === 'Enter') sendMessage();
    });
  })();
</script>
{% endblock %}
