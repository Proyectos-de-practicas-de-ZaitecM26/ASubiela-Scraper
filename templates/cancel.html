{% extends "base.html" %}

{% block title %}Pago Cancelado{% endblock %}

{% block content %}

    <a href="{{ url_for('payments.gestion_pagos') }}" class="btn btn-secondary">
        Ver planes de nuevo
    </a>
</div>
{% endblock %}
